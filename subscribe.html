<!doctype html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>航旅智省 | 订阅提醒</title><link rel="stylesheet" href="styles.css" /></head>
<body>
<header class="topbar"><div class="container nav-wrap"><div class="logo-glow">航旅智省</div><nav><a href="index.html">首页</a><a href="search.html">智能搜索</a><a href="deal-detail.html">特价详情</a><a class="active" href="subscribe.html">订阅提醒</a><a href="profile.html">个人中心</a></nav><button class="ghost-btn">新建订阅</button></div></header>
<main class="container">
  <section class="hero mini-hero">
    <h1 class="hero-title small">订阅中心</h1>
    <p class="muted">提醒不只告诉你“降价了”，而是直接给出可决策信息。</p>
  </section>

  <section class="grid-2">
    <article class="panel">
      <h2>四类订阅</h2>
      <div class="grid-2">
        <div class="card hover-pop"><h3>航线订阅</h3><p>北京-东京，未来2个月低于¥1800提醒。</p></div>
        <div class="card hover-pop"><h3>目的地订阅</h3><p>上海出发欧洲任意地，五一后最便宜提醒。</p></div>
        <div class="card hover-pop"><h3>活动订阅</h3><p>航司会员日 / 618 / 黑五 / 里程窗口。</p></div>
        <div class="card hover-pop"><h3>机会订阅</h3><p>周末捡漏 / 亲子寒假 / 商务舱误杀。</p></div>
      </div>
    </article>
    <article class="panel">
      <h2>提醒内容模板（可直接决策）</h2>
      <table class="table">
        <tr><th>字段</th><th>示例</th></tr>
        <tr><td>降了多少</td><td>较昨日再降 ¥220</td></tr>
        <tr><td>为什么降</td><td>会员日叠券 + 非热门返程</td></tr>
        <tr><td>限制</td><td>不含托运 / 改签费高</td></tr>
        <tr><td>值不值得买</td><td>建议现在买</td></tr>
        <tr><td>替代</td><td>+¥180 直飞 / -¥150 红眼</td></tr>
      </table>
    </article>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
